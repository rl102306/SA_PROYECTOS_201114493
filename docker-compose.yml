services:
  # ============================================
  # BASES DE DATOS
  # ============================================
  
  auth-db:
    image: postgres:15-alpine
    container_name: delivereats-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - delivereats-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-db:
    image: postgres:15-alpine
    container_name: delivereats-catalog-db
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_password
    ports:
      - "5433:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    networks:
      - delivereats-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:15-alpine
    container_name: delivereats-order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - delivereats-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MICROSERVICIOS
  # ============================================

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: delivereats-auth-service
    ports:
      - "50052:50052"
    environment:
      NODE_ENV: development
      GRPC_PORT: 50052
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: auth_password
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-DeliverEats2026
      JWT_EXPIRES_IN: 24h
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - delivereats-network
    restart: unless-stopped

  catalog-service:
    build:
      context: ./restaurant-catalog-service
      dockerfile: Dockerfile
    container_name: delivereats-catalog-service
    ports:
      - "50051:50051"
    environment:
      NODE_ENV: development
      GRPC_PORT: 50051
      DB_HOST: catalog-db
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: catalog_user
      DB_PASSWORD: catalog_password
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - delivereats-network
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: delivereats-order-service
    ports:
      - "50053:50053"
    environment:
      NODE_ENV: development
      GRPC_PORT: 50053
      DB_HOST: order-db
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: order_user
      DB_PASSWORD: order_password
      CATALOG_SERVICE_URL: catalog-service:50051
    depends_on:
      order-db:
        condition: service_healthy
      catalog-service:
        condition: service_started
    networks:
      - delivereats-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: delivereats-api-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_SERVICE_URL: auth-service:50052
      CATALOG_SERVICE_URL: catalog-service:50051
      ORDER_SERVICE_URL: order-service:50053
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-DeliverEats2026
      CORS_ORIGIN: http://localhost:4200
    depends_on:
      - auth-service
      - catalog-service
      - order-service
    networks:
      - delivereats-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: delivereats-frontend
    ports:
      - "4200:80"
    environment:
      API_URL: http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - delivereats-network
    restart: unless-stopped

# ============================================
# REDES Y VOLÚMENES
# ============================================

networks:
  delivereats-network:
    driver: bridge
    name: delivereats-network

volumes:
  auth-db-data:
    name: delivereats-auth-db-data
  catalog-db-data:
    name: delivereats-catalog-db-data
  order-db-data:
    name: delivereats-order-db-data
