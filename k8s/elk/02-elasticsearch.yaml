# =============================================================
# Elasticsearch — Almacenamiento y búsqueda de logs
# =============================================================
# StatefulSet de un único nodo (single-node cluster).
# En producción se usarían 3 nodos para alta disponibilidad.
#
# Índices por microservicio (definidos en Fluentd):
#   delivereats-api-gateway-YYYY.MM.DD
#   delivereats-auth-service-YYYY.MM.DD
#   delivereats-order-service-YYYY.MM.DD
#   ... (uno por cada microservicio)
#
# Por qué StatefulSet y no Deployment:
#   ES necesita identidad de red estable (nombre DNS predecible)
#   y almacenamiento persistente asociado al pod específico.
#   Los Deployments no garantizan esto.
# =============================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: logging
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      # GKE Autopilot no permite contenedores privilegiados.
      # En lugar de sysctl vm.max_map_count=262144, usamos node.store.allow_mmap=false
      # para que Elasticsearch use nio (no mmap) como store. Esto tiene impacto mínimo
      # en rendimiento para un cluster de demo single-node.
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          ports:
            - containerPort: 9200   # API HTTP (consultas, indexación)
            - containerPort: 9300   # Comunicación interna entre nodos

          env:
            - name: discovery.type
              value: "single-node"            # Modo single-node: no busca otros nodos
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"     # Heap fijo: evita que ES consuma toda la RAM
            - name: xpack.security.enabled
              value: "false"                  # Sin TLS/auth para demo (simplifica la config)
            - name: xpack.security.http.ssl.enabled
              value: "false"
            - name: node.store.allow_mmap
              value: "false"                  # Usa nio store: no requiere vm.max_map_count alto

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          volumeMounts:
            - name: es-data
              mountPath: /usr/share/elasticsearch/data

          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10

  volumeClaimTemplates:
    - metadata:
        name: es-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
# Service para que Fluentd y Kibana alcancen Elasticsearch
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: logging
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
