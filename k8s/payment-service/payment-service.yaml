apiVersion: v1
kind: Secret
metadata:
  name: payment-db-secret
  namespace: delivereats
type: Opaque
stringData:
  username: payment_user
  password: payment_password
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: payment-db
  namespace: delivereats
spec:
  serviceName: payment-db
  replicas: 1
  selector:
    matchLabels:
      app: payment-db
  template:
    metadata:
      labels:
        app: payment-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: payment_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "payment_user", "-d", "payment_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: payment-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: payment-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-db
  namespace: delivereats
spec:
  selector:
    app: payment-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: delivereats
data:
  GRPC_PORT: "50057"
  NODE_ENV: production
  DB_HOST: payment-db
  DB_PORT: "5432"
  DB_NAME: payment_db
  FX_SERVICE_URL: fx-service:50056
  ORDER_SERVICE_URL: order-service:50053
  NOTIFICATION_SERVICE_URL: notification-service:50055
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: delivereats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: delivereats/payment-service:latest
          ports:
            - containerPort: 50057
          envFrom:
            - configMapRef:
                name: payment-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: delivereats
spec:
  selector:
    app: payment-service
  ports:
    - port: 50057
      targetPort: 50057
