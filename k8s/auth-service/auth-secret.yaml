# =============================================================
# SECRET — auth-db-secret
# =============================================================
# Un Secret almacena datos sensibles (contraseñas, tokens, claves)
# de forma separada del código. Kubernetes los codifica en base64.
# Los Pods los consumen como variables de entorno o como archivos.
#
# type: Opaque → Secret genérico (la mayoría de casos de uso)
# stringData → permite escribir los valores en texto plano aquí;
#              Kubernetes los convierte internamente a base64.
#
# Comando para ver los secrets del namespace:
#   kubectl get secrets -n delivereats
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: auth-db-secret    # Nombre que referenciarán los Pods con secretKeyRef
  namespace: delivereats
type: Opaque              # Secret de propósito general (no es TLS ni Service Account)
stringData:
  username: auth_user     # Usuario de PostgreSQL para auth-db
  password: auth_password # Contraseña de PostgreSQL para auth-db

---
# =============================================================
# SECRET — jwt-secret
# =============================================================
# Almacena la clave secreta usada para firmar y verificar los
# JSON Web Tokens (JWT). Tanto auth-service como api-gateway
# necesitan la misma clave para que los tokens sean válidos.
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: delivereats
type: Opaque
stringData:
  jwt-secret: your-super-secret-jwt-key-change-in-production-DeliverEats2026
