# =============================================================
# SECRET — catalog-db-secret
# =============================================================
# Credenciales de acceso a la base de datos del catálogo.
# Los valores en stringData se convierten automáticamente a base64.
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: catalog-db-secret
  namespace: delivereats
type: Opaque
stringData:
  username: catalog_user
  password: catalog_password

---
# =============================================================
# STATEFULSET — catalog-db (PostgreSQL)
# =============================================================
# Base de datos exclusiva del catalog-service.
# Almacena: restaurantes y productos del catálogo.
#
# Cada microservicio tiene su propia BD (patrón Database-per-Service)
# para garantizar el desacoplamiento entre servicios.
# Si un microservicio falla, las demás BDs no se ven afectadas.
# =============================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalog-db
  namespace: delivereats
spec:
  serviceName: catalog-db   # Service asociado para DNS estable del Pod
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: catalog_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          # readinessProbe: Kubernetes marca el Pod como Ready solo cuando
          # PostgreSQL está aceptando conexiones. Los microservicios esperan
          # este estado antes de intentar conectarse.
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "catalog_user", "-d", "catalog_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: catalog-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: catalog-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

---
# =============================================================
# SERVICE — catalog-db (ClusterIP)
# =============================================================
# Punto de acceso estable para que catalog-service alcance su BD.
# DNS interno: catalog-db.delivereats.svc.cluster.local
# Uso simplificado dentro del mismo namespace: catalog-db:5432
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: delivereats
spec:
  type: ClusterIP   # IP virtual interna, reemplaza al anterior headless service
  selector:
    app: catalog-db
  ports:
    - port: 5432
      targetPort: 5432

---
# =============================================================
# DEPLOYMENT — catalog-service
# =============================================================
# Microservicio Node.js + gRPC que gestiona el catálogo.
# Expone RPCs: ListRestaurants, ListProducts, CreateProduct,
#              UpdateProduct, DeleteProduct
#
# Flujo: API Gateway → gRPC → catalog-service:50051 → catalog-db:5432
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: delivereats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: delivereats/catalog-service:latest
          imagePullPolicy: Always   # No intenta bajar la imagen de Docker Hub
          ports:
            - containerPort: 50051        # Puerto gRPC
          env:
            - name: NODE_ENV
              value: production
            - name: GRPC_PORT
              value: "50051"
            - name: DB_HOST
              value: catalog-db    # Resuelve al Service catalog-db definido arriba
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: catalog_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: password
            - name: RABBITMQ_URL
              value: amqp://delivereats:delivereats_pass@rabbitmq:5672
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"

---
# =============================================================
# SERVICE — catalog-service (ClusterIP)
# =============================================================
# Permite que api-gateway encuentre catalog-service por nombre DNS.
# El api-gateway usa: CATALOG_SERVICE_URL=catalog-service:50051
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: delivereats
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
    - port: 50051
      targetPort: 50051
