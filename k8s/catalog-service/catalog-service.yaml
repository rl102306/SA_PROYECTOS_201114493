apiVersion: v1
kind: Secret
metadata:
  name: catalog-db-secret
  namespace: delivereats
type: Opaque
stringData:
  username: catalog_user
  password: catalog_password
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalog-db
  namespace: delivereats
spec:
  serviceName: catalog-db
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: catalog_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "catalog_user", "-d", "catalog_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: catalog-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: catalog-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: delivereats
spec:
  selector:
    app: catalog-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: delivereats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: delivereats/catalog-service:latest
          ports:
            - containerPort: 50051
          env:
            - name: NODE_ENV
              value: production
            - name: GRPC_PORT
              value: "50051"
            - name: DB_HOST
              value: catalog-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: catalog_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-db-secret
                  key: password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: delivereats
spec:
  selector:
    app: catalog-service
  ports:
    - port: 50051
      targetPort: 50051
