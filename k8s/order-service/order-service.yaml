# =============================================================
# SECRET — order-db-secret
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: order-db-secret
  namespace: delivereats
type: Opaque
stringData:
  username: order_user
  password: order_password

---
# =============================================================
# STATEFULSET — order-db (PostgreSQL)
# =============================================================
# Base de datos exclusiva del order-service.
# Almacena: pedidos, items de pedido, historial de estados.
#
# Mayor capacidad de almacenamiento (5Gi) porque los pedidos
# acumulan historial a lo largo del tiempo.
# =============================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: order-db
  namespace: delivereats
spec:
  serviceName: order-db
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: order_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: order-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-db-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "order_user", "-d", "order_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: order-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: order-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi   # Mayor capacidad para historial de pedidos

---
# =============================================================
# SERVICE — order-db (ClusterIP)
# =============================================================
# DNS interno: order-db.delivereats.svc.cluster.local
# Uso simplificado: order-db:5432
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: delivereats
spec:
  type: ClusterIP
  selector:
    app: order-db
  ports:
    - port: 5432
      targetPort: 5432

---
# =============================================================
# DEPLOYMENT — order-service
# =============================================================
# Microservicio que gestiona el ciclo de vida de los pedidos.
# Estados: PENDING → CONFIRMED → PREPARING → READY → IN_TRANSIT → DELIVERED
#                                                               ↘ CANCELLED
#
# Flujo de creación de pedido:
#   1. Cliente crea pedido → order-service verifica con catalog-service
#   2. Restaurante acepta → estado CONFIRMED
#   3. Repartidor toma el pedido → estado IN_TRANSIT
#   4. Entregado → estado DELIVERED → payment-service procesa pago
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: delivereats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: delivereats/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50053
          env:
            - name: NODE_ENV
              value: production
            - name: GRPC_PORT
              value: "50053"
            - name: DB_HOST
              value: order-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: order_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: order-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-db-secret
                  key: password
            # order-service consulta catalog-service para validar productos
            - name: CATALOG_SERVICE_URL
              value: catalog-service:50051
            - name: RABBITMQ_URL
              value: amqp://delivereats:delivereats_pass@rabbitmq:5672
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"

---
# =============================================================
# SERVICE — order-service (ClusterIP)
# =============================================================
# Usado por: api-gateway (ORDER_SERVICE_URL=order-service:50053)
#            payment-service (ORDER_SERVICE_URL=order-service:50053)
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: delivereats
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - port: 50053
      targetPort: 50053
