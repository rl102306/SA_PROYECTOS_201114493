# =============================================================
# SERVICE — redis (ClusterIP)
# =============================================================
# Expone Redis internamente para que fx-service pueda conectarse
# usando el nombre DNS "redis:6379".
#
# type: ClusterIP (antes era headless con clusterIP: None).
# Con ClusterIP estándar, Redis sigue siendo accesible por su
# nombre de Service: redis.delivereats.svc.cluster.local
#
# fx-service se conecta con:
#   REDIS_HOST: redis
#   REDIS_PORT: 6379
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: delivereats
spec:
  type: ClusterIP   # IP virtual interna asignada automáticamente por Kubernetes
  selector:
    app: redis      # Redirige al Pod del StatefulSet redis-0
  ports:
    - port: 6379         # Puerto del Service
      targetPort: 6379   # Puerto del contenedor Redis
