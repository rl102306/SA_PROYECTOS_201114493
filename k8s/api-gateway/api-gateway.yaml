# =============================================================
# CONFIGMAP — api-gateway-config
# =============================================================
# El API Gateway es el único punto de entrada REST del sistema.
# Traduce peticiones HTTP del frontend a llamadas gRPC hacia
# los microservicios internos.
#
# Cada URL sigue el patrón:  <service-name>:<grpc-port>
# donde <service-name> es el nombre del Service de Kubernetes,
# que actúa como DNS interno dentro del cluster.
# =============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: delivereats
data:
  NODE_ENV: production
  PORT: "3000"                                              # Puerto HTTP del gateway

  # URLs de los microservicios gRPC internos.
  # Formato: <k8s-service-name>:<puerto-grpc>
  AUTH_SERVICE_URL: auth-service:50052                    # Autenticación y JWT
  CATALOG_SERVICE_URL: catalog-service:50051              # Restaurantes y productos
  ORDER_SERVICE_URL: order-service:50053                  # Gestión de pedidos
  DELIVERY_SERVICE_URL: delivery-service:50054            # Repartidores y entregas
  FX_SERVICE_URL: fx-service:50056                        # Tipos de cambio
  PAYMENT_SERVICE_URL: payment-service:50057              # Procesamiento de pagos
  NOTIFICATION_SERVICE_URL: notification-service:50055    # Emails de notificación

  # CORS: Define qué origen puede hacer peticiones al API Gateway.
  # En Minikube con Ingress, el frontend se accede por delivereats.local.
  # Si el frontend proxea las llamadas API via nginx, el CORS no aplica
  # (son llamadas servidor-a-servidor), pero se configura por si acaso.
  CORS_ORIGIN: http://delivereats.local

---
# =============================================================
# DEPLOYMENT — api-gateway
# =============================================================
# Punto de entrada único (Single Entry Point) para el frontend.
# Responsabilidades:
#   - Autenticar JWT en headers de Authorization
#   - Traducir HTTP REST → gRPC hacia el microservicio correspondiente
#   - Aplicar middleware de roles (ADMIN, RESTAURANT, CLIENT, DELIVERY)
#   - Rutas REST expuestas:
#       POST   /auth/login, /auth/register
#       GET    /catalog/restaurants, /catalog/restaurants/:id/products
#       POST   /catalog/menu (RESTAURANT)
#       GET    /orders/my-orders (CLIENT)
#       GET    /admin/orders (ADMIN/RESTAURANT)
#       PATCH  /admin/orders/:id/status (ADMIN)
#       POST   /admin/orders/:orderId/refund (ADMIN)
#       GET    /delivery/dashboard (DELIVERY)
#       PUT    /delivery/:id/status (DELIVERY)
#       POST   /payment/process (CLIENT)
#
# replicas: 2 → Alta disponibilidad: si un Pod falla, el otro sigue
#               atendiendo mientras Kubernetes reinicia el fallido.
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: delivereats
spec:
  replicas: 1   # 1 réplica para ahorrar RAM en máquina con 8GB
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: delivereats/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000   # Puerto HTTP
          # Carga todas las variables del ConfigMap
          envFrom:
            - configMapRef:
                name: api-gateway-config
          # El JWT Secret se carga del Secret (dato sensible)
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret

          # readinessProbe: Kubernetes solo envía tráfico al Pod cuando
          # el endpoint /health responde con HTTP 200.
          # Esto evita enviar peticiones a un gateway que aún está iniciando.
          readinessProbe:
            httpGet:
              path: /health   # Endpoint que devuelve { status: "ok" }
              port: 3000
            initialDelaySeconds: 10   # Espera 10s antes del primer chequeo
            periodSeconds: 5          # Verifica cada 5s

          # livenessProbe: Si /health falla repetidamente, Kubernetes
          # reinicia el Pod automáticamente (auto-healing).
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30   # Más tiempo inicial para que el servicio esté estable
            periodSeconds: 10

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"

---
# =============================================================
# SERVICE — api-gateway (ClusterIP)
# =============================================================
# Expone el api-gateway internamente. El Ingress (definido abajo)
# redirige el tráfico externo a este Service.
#
# IMPORTANTE: El nombre "api-gateway" coincide deliberadamente con
# el nombre del servicio en docker-compose.yml. Así nginx.conf
# puede usar "api-gateway:3000" en AMBOS entornos sin cambios.
#
# type: ClusterIP → No expuesto directamente al exterior.
# El acceso exterior se maneja via Ingress con nginx.
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: api-gateway   # Mismo nombre que en Docker Compose → nginx.conf funciona en ambos entornos
  namespace: delivereats
spec:
  type: ClusterIP
  selector:
    app: api-gateway   # Balancea entre los 2 Pods del Deployment
  ports:
    - port: 3000
      targetPort: 3000

---
# =============================================================
# INGRESS — api-gateway-ingress
# =============================================================
# Un Ingress define reglas de enrutamiento HTTP/HTTPS hacia Services.
# El controlador de Ingress (nginx en Minikube) procesa estas reglas
# y actúa como reverse proxy.
#
# Flujo de una petición externa:
#   Browser → http://api.delivereats.local/auth/login
#   → Minikube Ingress Controller (nginx)
#   → api-gateway-service:3000
#   → api-gateway Pod
#   → auth-service:50052 (gRPC)
#
# Para que funcione, /etc/hosts (o hosts de Windows) debe tener:
#   <minikube-ip>  api.delivereats.local
#   <minikube-ip>  delivereats.local
# =============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: delivereats
  annotations:
    # Permite subir archivos grandes (fotos de entrega en base64)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx   # Usa el controlador nginx instalado con "minikube addons enable ingress"
  rules:
    # Hostname bajo el que el API Gateway es accesible desde el exterior
    - host: api.delivereats.local
      http:
        paths:
          - path: /
            pathType: Prefix   # Cualquier ruta que empiece con / se envía al backend
            backend:
              service:
                name: api-gateway   # Service al que se redirige
                port:
                  number: 3000
