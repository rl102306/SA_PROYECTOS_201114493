apiVersion: v1
kind: ConfigMap
metadata:
  name: fx-service-config
  namespace: delivereats
data:
  GRPC_PORT: "50056"
  NODE_ENV: production
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  EXCHANGE_RATE_API_URL: https://open.er-api.com/v6/latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fx-service
  namespace: delivereats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fx-service
  template:
    metadata:
      labels:
        app: fx-service
    spec:
      containers:
        - name: fx-service
          image: delivereats/fx-service:latest
          ports:
            - containerPort: 50056
          envFrom:
            - configMapRef:
                name: fx-service-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fx-service
  namespace: delivereats
spec:
  selector:
    app: fx-service
  ports:
    - port: 50056
      targetPort: 50056
