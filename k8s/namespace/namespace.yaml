# =============================================================
# NAMESPACE — delivereats
# =============================================================
# Un Namespace es un espacio de nombres virtual dentro del cluster.
# Agrupa todos los recursos del proyecto (Pods, Services, Secrets, etc.)
# y los aísla de otros proyectos que puedan existir en el mismo cluster.
#
# Sin namespace, todos los recursos van al namespace "default", lo que
# genera conflictos de nombres en equipos grandes.
#
# Comando para ver todos los namespaces del cluster:
#   kubectl get namespaces
# =============================================================

apiVersion: v1        # Versión de la API de Kubernetes para este recurso
kind: Namespace       # Tipo de recurso: Namespace
metadata:
  name: delivereats   # Nombre del namespace. Se usará en todos los demás YAML con "namespace: delivereats"
  labels:
    app: delivereats  # Label para identificar/filtrar recursos de este proyecto
