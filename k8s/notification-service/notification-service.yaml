apiVersion: v1
kind: Secret
metadata:
  name: smtp-secret
  namespace: delivereats
type: Opaque
stringData:
  smtp-user: "tu-email@gmail.com"      # Cambiar por email real
  smtp-password: "tu-app-password"      # Cambiar por contraseña de aplicación
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: delivereats
data:
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: "587"
  GRPC_PORT: "50055"
  NODE_ENV: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: delivereats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: delivereats/notification-service:latest
          ports:
            - containerPort: 50055
          envFrom:
            - configMapRef:
                name: notification-config
          env:
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: smtp-user
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: smtp-password
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: delivereats
spec:
  selector:
    app: notification-service
  ports:
    - port: 50055
      targetPort: 50055
