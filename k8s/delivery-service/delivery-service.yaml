# =============================================================
# SECRET — delivery-db-secret
# =============================================================

apiVersion: v1
kind: Secret
metadata:
  name: delivery-db-secret
  namespace: delivereats
type: Opaque
stringData:
  username: delivery_user
  password: delivery_password

---
# =============================================================
# STATEFULSET — delivery-db (PostgreSQL)
# =============================================================
# Base de datos exclusiva del delivery-service.
# Almacena: repartidores, asignaciones de entrega, fotos en base64.
#
# 10Gi de almacenamiento porque las fotos de entrega se guardan
# como strings base64 directamente en la BD (pueden ser grandes).
# =============================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: delivery-db
  namespace: delivereats
spec:
  serviceName: delivery-db
  replicas: 1
  selector:
    matchLabels:
      app: delivery-db
  template:
    metadata:
      labels:
        app: delivery-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: delivery_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: delivery-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: delivery-db-secret
                  key: password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "delivery_user", "-d", "delivery_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: delivery-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: delivery-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi   # Mayor capacidad por las fotos base64 de entregas

---
# =============================================================
# SERVICE — delivery-db (ClusterIP)
# =============================================================
# DNS interno: delivery-db.delivereats.svc.cluster.local
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: delivery-db
  namespace: delivereats
spec:
  type: ClusterIP
  selector:
    app: delivery-db
  ports:
    - port: 5432
      targetPort: 5432

---
# =============================================================
# DEPLOYMENT — delivery-service
# =============================================================
# Gestiona el módulo de repartidores (Delivery Persons).
# Funciones:
#   - Asignar pedidos a repartidores disponibles
#   - Actualizar estado de entrega (ASSIGNED → PICKED_UP → IN_TRANSIT → DELIVERED)
#   - Almacenar foto de entrega (base64) como evidencia
#   - Cancelar entregas con motivo
#
# Expone RPC: AssignDelivery, UpdateStatus, GetDeliveryByOrder
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: delivereats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
        - name: delivery-service
          image: delivereats/delivery-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50054
          env:
            - name: NODE_ENV
              value: production
            - name: GRPC_PORT
              value: "50054"
            - name: DB_HOST
              value: delivery-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: delivery_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: delivery-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: delivery-db-secret
                  key: password
          # Mayor límite de memoria porque maneja imágenes base64
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "300m"

---
# =============================================================
# SERVICE — delivery-service (ClusterIP)
# =============================================================
# Usado por: api-gateway (DELIVERY_SERVICE_URL=delivery-service:50054)
# =============================================================

apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: delivereats
spec:
  type: ClusterIP
  selector:
    app: delivery-service
  ports:
    - port: 50054
      targetPort: 50054
