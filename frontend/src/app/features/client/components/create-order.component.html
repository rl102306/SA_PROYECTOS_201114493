<div class="order-container">
  <div class="order-header">
    <h1>Crear Nueva Orden</h1>
    <div class="header-buttons">
      <button class="btn btn-info" (click)="goToCatalog()">
        Ver Catálogo
      </button>
      <button class="btn btn-secondary" (click)="logout()">
        Cerrar Sesión
      </button>
    </div>
  </div>

  <!-- ================== FORM ================== -->
  <div class="order-card">
    <form [formGroup]="orderForm" (ngSubmit)="onSubmit()">

      <!-- Restaurante -->
      <div class="form-group highlight">
        <label>🏪 Restaurante</label>
        <select formControlName="restaurantId" class="form-control">
          <option value="">Selecciona un restaurante</option>
          <option
            *ngFor="let restaurant of availableRestaurants"
            [value]="restaurant.id"
          >
            {{ restaurant.name }} - {{ restaurant.type }}
          </option>
        </select>
      </div>

      <!-- Dirección -->
      <div class="form-group">
        <label>📍 Dirección de Entrega</label>
        <input
          type="text"
          formControlName="deliveryAddress"
          class="form-control"
        />
      </div>

      <!-- ================== PRODUCTOS ================== -->
      <div class="products-section">
        <div class="section-header">
          <h3>🛒 Productos</h3>
          <div class="button-group">
            <button
              type="button"
              class="btn btn-success btn-sm"
              (click)="addItemFromCatalog()"
            >
              + Desde Catálogo
            </button>

            <button
              type="button"
              class="btn btn-warning btn-sm"
              (click)="addItemManual()"
            >
              ✏️ Manual
            </button>
          </div>
        </div>

        <div class="items-list">

          <div formArrayName="items">

            <div
              *ngFor="let item of items.controls; let i = index"
              [formGroupName]="i"
              class="item-row"
            >

              <div class="item-number">{{ i + 1 }}</div>

              <!-- ===== MODO CATÁLOGO ===== -->
              <div *ngIf="item.get('mode')?.value === 'catalog'" class="item-content">

                <div class="form-group">
                  <label>Producto</label>
                  <select
                    formControlName="productId"
                    (change)="onProductChange(i)"
                    class="form-control"
                  >
                    <option value="">Selecciona un producto</option>
                    <option
                      *ngFor="let product of restaurantProducts"
                      [value]="product.id"
                    >
                      {{ product.name }} - Q{{ product.price.toFixed(2) }}
                    </option>
                  </select>
                </div>

                <div class="form-group">
                  <label>Cantidad</label>
                  <input
                    type="number"
                    formControlName="quantity"
                    min="1"
                    class="form-control"
                  />
                </div>

                <div class="form-group">
                  <label>Precio</label>
                  <input
                    type="number"
                    formControlName="price"
                    readonly
                    class="form-control"
                  />
                </div>

              </div>

              <!-- ===== MODO MANUAL ===== -->
              <div *ngIf="item.get('mode')?.value === 'manual'" class="item-content">

                <div class="form-group">
                  <label>Product ID</label>
                  <input
                    type="text"
                    formControlName="productId"
                    class="form-control"
                  />
                </div>

                <div class="form-group">
                  <label>Cantidad</label>
                  <input
                    type="number"
                    formControlName="quantity"
                    min="1"
                    class="form-control"
                  />
                </div>

                <div class="form-group">
                  <label>Precio</label>
                  <input
                    type="number"
                    formControlName="price"
                    step="0.01"
                    class="form-control"
                  />
                </div>

              </div>

              <div class="item-total">
                Q{{
                  (item.get('quantity')?.value || 0) *
                  (item.get('price')?.value || 0)
                }}
              </div>

              <button
                type="button"
                class="btn btn-danger btn-sm"
                (click)="removeItem(i)"
              >
                🗑️
              </button>

            </div>

          </div>

          <div *ngIf="items.length === 0" class="empty-state">
            <p>No hay productos agregados.</p>
          </div>

        </div>
      </div>

      <!-- ================== TOTAL ================== -->
      <div class="order-total" *ngIf="items.length > 0">
        <h3>Total: Q{{ getTotalAmount().toFixed(2) }}</h3>
      </div>

      <!-- Mensajes -->
      <div class="alert alert-success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        ❌ {{ errorMessage }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn btn-primary btn-block btn-lg"
        [disabled]="orderForm.invalid || items.length === 0 || isLoading"
      >
        <span *ngIf="!isLoading">Realizar Pedido</span>
        <span *ngIf="isLoading">⏳ Validando...</span>
      </button>

    </form>
  </div>
</div>
