<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>Delivereats</h1>
      <p>Crea tu cuenta</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <!-- Nombre -->
      <div class="form-group">
        <label for="firstName">Nombre</label>
        <input
          id="firstName"
          type="text"
          formControlName="firstName"
          placeholder="Juan"
          class="form-control"
          [class.error]="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched"
        />
        <div class="error-message" *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched">
          <span>El nombre es requerido</span>
        </div>
      </div>

      <!-- Apellido -->
      <div class="form-group">
        <label for="lastName">Apellido</label>
        <input
          id="lastName"
          type="text"
          formControlName="lastName"
          placeholder="Pérez"
          class="form-control"
          [class.error]="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched"
        />
        <div class="error-message" *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched">
          <span>El apellido es requerido</span>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
          class="form-control"
          [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        />
        <div class="error-message" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          <span *ngIf="registerForm.get('email')?.errors?.['required']">El email es requerido</span>
          <span *ngIf="registerForm.get('email')?.errors?.['email']">Email inválido</span>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="form-control"
          [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
        />
        <div class="error-message" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          <span *ngIf="registerForm.get('password')?.errors?.['required']">La contraseña es requerida</span>
          <span *ngIf="registerForm.get('password')?.errors?.['minlength']">Mínimo 8 caracteres</span>
        </div>
      </div>

      <!-- Confirmar Contraseña -->
      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="••••••••"
          class="form-control"
          [class.error]="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched"
        />
        <div class="error-message" *ngIf="registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched">
          <span>Las contraseñas no coinciden</span>
        </div>
      </div>

      <!-- Rol -->
      <div class="form-group">
        <label for="role">Tipo de cuenta</label>
        <select
          id="role"
          formControlName="role"
          class="form-control"
        >
          <option value="CLIENT">Cliente</option>
          <option value="RESTAURANT">Restaurante</option>
          <option value="DELIVERY">Repartidor</option>
        </select>
      </div>

      <!-- Success Message -->
      <div class="alert alert-success" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <!-- Error Message -->
      <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="registerForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">Registrarse</span>
        <span *ngIf="isLoading">Registrando...</span>
      </button>

      <!-- Login Link -->
      <div class="login-link">
        <p>¿Ya tienes cuenta? <a (click)="goToLogin()">Inicia sesión aquí</a></p>
      </div>
    </form>
  </div>
</div>
