syntax = "proto3";

package order;

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder (GetOrderRequest) returns (GetOrderResponse);
  rpc GetUserOrders (GetUserOrdersRequest) returns (GetUserOrdersResponse);
  rpc UpdateOrderStatus (UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  // Admin: obtener todos los pedidos con filtros (estados válidos: PENDING, CONFIRMED, PREPARING, IN_DELIVERY, DELIVERED, CANCELLED, PAID)
  rpc GetAllOrders (GetAllOrdersRequest) returns (GetAllOrdersResponse);
}

message CreateOrderRequest {
  string user_id = 1;
  string restaurant_id = 2;
  repeated OrderItem items = 3;
  string delivery_address = 4;
}

message OrderItem {
  string product_id = 1;
  int32 quantity = 2;
  double price = 3;
}

message CreateOrderResponse {
  bool success = 1;
  string message = 2;
  Order order = 3;
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  bool found = 1;
  Order order = 2;
}

message GetUserOrdersRequest {
  string user_id = 1;
}

message GetUserOrdersResponse {
  repeated Order orders = 1;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  string status = 2;
}

message UpdateOrderStatusResponse {
  bool success = 1;
  string message = 2;
}

message Order {
  string id = 1;
  string user_id = 2;
  string restaurant_id = 3;
  repeated OrderItem items = 4;
  string status = 5;
  double total_amount = 6;
  string delivery_address = 7;
  string created_at = 8;
}

message GetAllOrdersRequest {
  repeated string statuses = 1;  // ej: ["DELIVERED","CANCELLED","PAID"]
  string date_from = 2;          // ISO 8601
  string date_to = 3;            // ISO 8601
  string user_id = 4;            // opcional
}

message GetAllOrdersResponse {
  bool success = 1;
  string message = 2;
  repeated Order orders = 3;
}
