name: DeliverEats CI/CD

# Se activa cuando hay un push a main o un Pull Request hacia main.
# - Push a main: ejecuta el ciclo completo build + test + push + deploy
# - Pull Request a main: ejecuta build + test (sin push ni deploy)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/delivereats
  K8S_NAMESPACE: delivereats

# Permiso necesario para Workload Identity Federation
permissions:
  contents: read
  id-token: write

jobs:
  # ============================================================
  # JOB 0: TERRAFORM VALIDATE
  # Valida el código de infraestructura antes de cualquier build.
  # Si el IaC está mal formateado o inválido, falla aquí rápido.
  #
  # terraform fmt -check : detecta archivos mal formateados
  # terraform validate   : verifica sintaxis y referencias
  # terraform plan       : simula los cambios (sin aplicar)
  # ============================================================
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform fmt check
        working-directory: ./terraform
        run: |
          terraform fmt -recursive
          if ! git diff --exit-code; then
            echo "──────────────────────────────────────────────────"
            echo " ERROR: Los siguientes archivos necesitan formato:"
            git diff --name-only
            echo " Ejecuta 'terraform fmt -recursive' localmente"
            echo " y commitea los cambios antes de hacer push."
            echo "──────────────────────────────────────────────────"
            exit 1
          fi
          echo "OK: todos los archivos Terraform están formateados."

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          # Override temporal: sustituye el backend GCS por uno local para CI.
          # Esto permite que terraform init y plan corran sin el bucket GCS real.
          # El archivo se elimina al final del step para no ensuciar el workspace.
          printf 'terraform { backend "local" { path = "/tmp/tfstate" } }\n' > ci_backend_override.tf
          terraform init -reconfigure -input=false
          rm ci_backend_override.tf

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate
        # Verifica que las referencias entre módulos y variables son correctas

      - name: Terraform Plan (dry-run)
        working-directory: ./terraform
        # El plan usa backend local (inicializado en el step anterior).
        # continue-on-error: true para que no falle el pipeline si GCP no está
        # disponible (ej. secrets no configurados en forks).
        continue-on-error: true
        run: |
          # Re-aplicar override de backend local para el plan
          printf 'terraform { backend "local" { path = "/tmp/tfstate" } }\n' > ci_backend_override.tf
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="sql_password=dummy-for-validation" \
            -var="frontend_image=gcr.io/dummy/image:latest" \
            -input=false \
            -no-color
          rm ci_backend_override.tf
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY_JSON }}

  # ============================================================
  # JOB 1: BUILD
  # Construye todas las imagenes Docker de los microservicios.
  # Corre en todas las ramas para detectar errores de build
  # antes de que lleguen a main.
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [terraform]

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      # Calcula el tag de version basado en el SHA corto del commit.
      # Ejemplo: si el commit es abc1234def, el tag sera "abc1234".
      - name: Calcular tag de version
        id: version
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Autenticacion con GCP usando Workload Identity Federation.
      # No requiere JSON key, GCP confia directamente en GitHub Actions.
      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build api-gateway
        run: |
          docker build -t $REGISTRY/api-gateway:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/api-gateway:latest \
                       ./api-gateway

      - name: Build auth-service
        run: |
          docker build -t $REGISTRY/auth-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/auth-service:latest \
                       ./auth-service

      - name: Build catalog-service
        run: |
          docker build -t $REGISTRY/catalog-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/catalog-service:latest \
                       ./restaurant-catalog-service

      - name: Build order-service
        run: |
          docker build -t $REGISTRY/order-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/order-service:latest \
                       ./order-service

      - name: Build delivery-service
        run: |
          docker build -t $REGISTRY/delivery-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/delivery-service:latest \
                       ./delivery-service

      - name: Build fx-service
        run: |
          docker build -t $REGISTRY/fx-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/fx-service:latest \
                       ./fx-service

      - name: Build payment-service
        run: |
          docker build -t $REGISTRY/payment-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/payment-service:latest \
                       ./payment-service

      - name: Build notification-service
        run: |
          docker build -t $REGISTRY/notification-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/notification-service:latest \
                       ./notification-service

      - name: Build frontend
        run: |
          docker build -t $REGISTRY/frontend:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/frontend:latest \
                       ./frontend

      - name: Build order-cleanup
        run: |
          docker build -t $REGISTRY/order-cleanup:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/order-cleanup:latest \
                       ./order-cleanup

      - name: Listar imagenes construidas
        run: docker images | grep delivereats

  # ============================================================
  # JOB 2: TEST
  # Ejecuta los unit tests de los servicios core.
  # Si falla cualquier test, el pipeline se detiene aqui.
  # ============================================================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            restaurant-catalog-service/package-lock.json
            order-service/package-lock.json
            auth-service/package-lock.json

      - name: Instalar dependencias — restaurant-catalog-service
        working-directory: ./restaurant-catalog-service
        run: npm ci

      - name: Ejecutar tests — restaurant-catalog-service
        working-directory: ./restaurant-catalog-service
        run: npm test -- --forceExit --passWithNoTests

      - name: Instalar dependencias — order-service
        working-directory: ./order-service
        run: npm ci

      - name: Ejecutar tests — order-service
        working-directory: ./order-service
        run: npm test -- --forceExit --passWithNoTests

      - name: Instalar dependencias — auth-service
        working-directory: ./auth-service
        run: npm ci

      - name: Ejecutar tests — auth-service
        working-directory: ./auth-service
        run: npm test -- --forceExit --passWithNoTests

  # ============================================================
  # JOB 3: PUSH
  # Publica las imagenes en Google Artifact Registry.
  # Solo corre en main, despues de que build Y test pasen.
  # ============================================================
  push:
    name: Push Images to Artifact Registry
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Calcular tag de version
        id: version
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build y Push api-gateway
        run: |
          docker build -t $REGISTRY/api-gateway:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/api-gateway:latest \
                       ./api-gateway
          docker push $REGISTRY/api-gateway:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/api-gateway:latest

      - name: Build y Push auth-service
        run: |
          docker build -t $REGISTRY/auth-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/auth-service:latest \
                       ./auth-service
          docker push $REGISTRY/auth-service:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/auth-service:latest

      - name: Build y Push catalog-service
        run: |
          docker build -t $REGISTRY/catalog-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/catalog-service:latest \
                       ./restaurant-catalog-service
          docker push $REGISTRY/catalog-service:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/catalog-service:latest

      - name: Build y Push order-service
        run: |
          docker build -t $REGISTRY/order-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/order-service:latest \
                       ./order-service
          docker push $REGISTRY/order-service:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/order-service:latest

      - name: Build y Push delivery-service
        run: |
          docker build -t $REGISTRY/delivery-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/delivery-service:latest \
                       ./delivery-service
          docker push $REGISTRY/delivery-service:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/delivery-service:latest

      - name: Build y Push fx-service
        run: |
          docker build -t $REGISTRY/fx-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/fx-service:latest \
                       ./fx-service
          docker push $REGISTRY/fx-service:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/fx-service:latest

      - name: Build y Push payment-service
        run: |
          docker build -t $REGISTRY/payment-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/payment-service:latest \
                       ./payment-service
          docker push $REGISTRY/payment-service:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/payment-service:latest

      - name: Build y Push notification-service
        run: |
          docker build -t $REGISTRY/notification-service:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/notification-service:latest \
                       ./notification-service
          docker push $REGISTRY/notification-service:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/notification-service:latest

      - name: Build y Push frontend
        run: |
          docker build -t $REGISTRY/frontend:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/frontend:latest \
                       ./frontend
          docker push $REGISTRY/frontend:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/frontend:latest

      - name: Build y Push order-cleanup
        run: |
          docker build -t $REGISTRY/order-cleanup:${{ steps.version.outputs.tag }} \
                       -t $REGISTRY/order-cleanup:latest \
                       ./order-cleanup
          docker push $REGISTRY/order-cleanup:${{ steps.version.outputs.tag }}
          docker push $REGISTRY/order-cleanup:latest

      - name: Resumen de imagenes publicadas
        run: |
          echo "================================================"
          echo " Imagenes publicadas en Artifact Registry"
          echo " Registry: $REGISTRY"
          echo " Version:  ${{ steps.version.outputs.tag }}"
          echo " Branch:   ${{ github.ref_name }}"
          echo " Commit:   ${{ github.sha }}"
          echo "================================================"

  # ============================================================
  # JOB 4: DEPLOY
  # Despliega los manifests de K8s al cluster de GKE.
  # Solo corre en main, despues de que push termine exitosamente.
  # ============================================================
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Calcular tag de version
        id: version
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Instalar gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Obtener credenciales del cluster GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER_NAME }}
          location: ${{ secrets.GCP_CLUSTER_ZONE }}

      - name: Actualizar imagenes en manifests para GCP
        run: |
          TAG=${{ steps.version.outputs.tag }}
          REGISTRY_URL="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/delivereats"
          find k8s -name "*.yaml" -exec sed -i \
            "s|image: delivereats/\([^:]*\):latest|image: ${REGISTRY_URL}/\1:${TAG}|g" {} \;
          echo "Imagenes actualizadas:"
          grep -r "image:.*pkg.dev" k8s/ || echo "Sin cambios detectados"

      - name: Aplicar namespace
        run: kubectl apply -f k8s/namespace/

      - name: Aplicar stack ELK (logging)
        run: kubectl apply -f k8s/elk/

      - name: Aplicar stack de monitoreo (Prometheus + Grafana)
        run: kubectl apply -f k8s/monitoring/

      - name: Aplicar infraestructura (RabbitMQ y Redis)
        run: |
          kubectl apply -f k8s/rabbitmq/
          kubectl apply -f k8s/redis/

      - name: Aplicar microservicios
        run: |
          kubectl apply -f k8s/auth-service/
          kubectl apply -f k8s/catalog-service/
          kubectl apply -f k8s/order-service/
          kubectl apply -f k8s/delivery-service/
          kubectl apply -f k8s/fx-service/
          kubectl apply -f k8s/payment-service/
          kubectl apply -f k8s/notification-service/
          kubectl apply -f k8s/api-gateway/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/cronjobs/

      - name: Reiniciar deployments para aplicar nuevas imagenes
        run: |
          kubectl rollout restart deployment/api-gateway -n $K8S_NAMESPACE
          kubectl rollout restart deployment/auth-service -n $K8S_NAMESPACE
          kubectl rollout restart deployment/catalog-service -n $K8S_NAMESPACE
          kubectl rollout restart deployment/order-service -n $K8S_NAMESPACE
          kubectl rollout restart deployment/delivery-service -n $K8S_NAMESPACE
          kubectl rollout restart deployment/fx-service -n $K8S_NAMESPACE
          kubectl rollout restart deployment/payment-service -n $K8S_NAMESPACE
          kubectl rollout restart deployment/notification-service -n $K8S_NAMESPACE
          kubectl rollout restart deployment/frontend -n $K8S_NAMESPACE

      - name: Reiniciar statefulsets para aplicar cambios de configuracion
        run: |
          kubectl rollout restart statefulset/auth-db -n $K8S_NAMESPACE
          kubectl rollout restart statefulset/catalog-db -n $K8S_NAMESPACE
          kubectl rollout restart statefulset/order-db -n $K8S_NAMESPACE
          kubectl rollout restart statefulset/payment-db -n $K8S_NAMESPACE
          kubectl rollout restart statefulset/delivery-db -n $K8S_NAMESPACE
          kubectl rollout restart statefulset/redis -n $K8S_NAMESPACE

      # GKE Autopilot provisiona nodos bajo demanda, lo que puede tardar varios minutos.
      # continue-on-error: true evita que el pipeline falle por timeout mientras los nodos levantan.
      # El resumen final muestra el estado real de los pods.
      - name: Esperar a que los deployments esten listos
        continue-on-error: true
        run: |
          kubectl rollout status deployment/api-gateway -n $K8S_NAMESPACE --timeout=600s
          kubectl rollout status deployment/auth-service -n $K8S_NAMESPACE --timeout=600s
          kubectl rollout status deployment/catalog-service -n $K8S_NAMESPACE --timeout=600s
          kubectl rollout status deployment/order-service -n $K8S_NAMESPACE --timeout=600s
          kubectl rollout status deployment/delivery-service -n $K8S_NAMESPACE --timeout=600s
          kubectl rollout status deployment/fx-service -n $K8S_NAMESPACE --timeout=600s
          kubectl rollout status deployment/payment-service -n $K8S_NAMESPACE --timeout=600s
          kubectl rollout status deployment/notification-service -n $K8S_NAMESPACE --timeout=600s
          kubectl rollout status deployment/frontend -n $K8S_NAMESPACE --timeout=600s

      - name: Resumen del despliegue
        run: |
          echo "================================================"
          echo " DESPLIEGUE EXITOSO"
          echo "================================================"
          echo " Cluster:    ${{ secrets.GCP_CLUSTER_NAME }}"
          echo " Zona:       ${{ secrets.GCP_CLUSTER_ZONE }}"
          echo " Proyecto:   ${{ secrets.GCP_PROJECT_ID }}"
          echo " Namespace:  $K8S_NAMESPACE"
          echo " Version:    ${{ steps.version.outputs.tag }}"
          echo " Commit:     ${{ github.sha }}"
          echo " Branch:     ${{ github.ref_name }}"
          echo " Ejecutado:  $(date -u)"
          echo "================================================"
          kubectl get pods -n $K8S_NAMESPACE
          kubectl get services -n $K8S_NAMESPACE

  # ============================================================
  # JOB 5: ANSIBLE
  # Provisiona la VM de load testing después del deploy.
  # Solo corre en push a main.
  # Instala Python, pip y Locust de forma idempotente.
  # ============================================================
  ansible:
    name: Ansible — Provision Load Test VM
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Instalar Ansible
        run: |
          pip install ansible

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LOADTEST_VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Ejecutar playbook de Ansible
        working-directory: ./ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook playbook.yml \
            -i "${{ secrets.LOADTEST_VM_IP }}," \
            -e "app_base_url=http://delivereats.local" \
            --private-key ~/.ssh/id_rsa \
            -u ubuntu

  # ============================================================
  # JOB 6: SMOKE TEST
  # Valida el flujo crítico después del deploy y provisioning.
  # Solo corre en push a main.
  # ============================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [ansible]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout codigo fuente
        uses: actions/checkout@v4

      - name: Instalar dependencias del smoke test
        run: sudo apt-get install -y curl jq

      - name: Ejecutar smoke test
        env:
          BASE_URL: "http://delivereats.local"
        run: |
          chmod +x tests/smoke/smoke_test.sh
          tests/smoke/smoke_test.sh

      - name: Subir resultado como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ github.sha }}
          path: /tmp/smoke_response.json
          retention-days: 7
