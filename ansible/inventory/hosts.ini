# Inventario de hosts de DeliverEats
# La IP de la VM viene del output de Terraform: loadtest_vm_ip
# En CI/CD se sobreescribe con: ansible-playbook -i "IP," playbook.yml

[loadtest]
# Reemplazar con la IP pública de la VM (output de Terraform)
# delivereats-loadtest ansible_host=<IP_DE_TERRAFORM>

[loadtest:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
