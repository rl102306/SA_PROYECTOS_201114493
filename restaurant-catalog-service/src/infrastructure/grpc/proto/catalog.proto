syntax = "proto3";

package catalog;

service CatalogService {
  rpc ValidateOrder (ValidationRequest) returns (ValidationResponse);
  rpc GetProduct (GetProductRequest) returns (GetProductResponse);
  rpc GetRestaurantCatalog (GetRestaurantCatalogRequest) returns (GetRestaurantCatalogResponse);
  rpc ListRestaurants (ListRestaurantsRequest) returns (ListRestaurantsResponse);
  rpc CreateProduct (CreateProductRequest) returns (ProductResponse);
  rpc UpdateProduct (UpdateProductRequest) returns (ProductResponse);
  rpc DeleteProduct (DeleteProductRequest) returns (DeleteProductResponse);
  rpc CreateRestaurant (CreateRestaurantRequest) returns (CreateRestaurantResponse);
}

message ValidationRequest {
  string restaurant_id = 1;
  repeated OrderItem items = 2;
}

message OrderItem {
  string product_id = 1;
  int32 quantity = 2;
  double expected_price = 3;
}

message ValidationResponse {
  bool is_valid = 1;
  string message = 2;
  repeated ValidationError errors = 3;
}

message ValidationError {
  string product_id = 1;
  string error_type = 2;
  string message = 3;
}

message GetProductRequest {
  string product_id = 1;
}

message GetProductResponse {
  bool found = 1;
  Product product = 2;
}

message GetRestaurantCatalogRequest {
  string restaurant_id = 1;
}

message GetRestaurantCatalogResponse {
  repeated Product products = 1;
}

message Product {
  string id = 1;
  string restaurant_id = 2;
  string name = 3;
  string description = 4;
  double price = 5;
  string category = 6;
  bool is_available = 7;
  string image_url = 8;
}

message ListRestaurantsRequest {
  bool active_only = 1;
}

message RestaurantMessage {
  string id = 1;
  string name = 2;
  string address = 3;
  string phone = 4;
  string email = 5;
  string description = 6;
  bool is_active = 7;
}

message ListRestaurantsResponse {
  repeated RestaurantMessage restaurants = 1;
}

// CRUD de productos
message CreateProductRequest {
  string restaurant_id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  string category = 5;
  bool is_available = 6;
}

message UpdateProductRequest {
  string id = 1;
  string restaurant_id = 2;
  string name = 3;
  string description = 4;
  double price = 5;
  string category = 6;
  bool is_available = 7;
}

message ProductResponse {
  bool success = 1;
  string message = 2;
  Product product = 3;
}

message DeleteProductRequest {
  string id = 1;
  string restaurant_id = 2;
}

message DeleteProductResponse {
  bool success = 1;
  string message = 2;
}

message CreateRestaurantRequest {
  string id = 1;
  string name = 2;
  string email = 3;
}

message CreateRestaurantResponse {
  bool success = 1;
  string message = 2;
}
